name: snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Guicicca90
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            const fs = require('fs');
            const files = ['github-contribution-grid-snake.svg', 'github-contribution-grid-snake-dark.svg'];

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/output'
              });
            } catch {
              const main = await github.rest.git.getRef({
                owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/main'
              });
              await github.rest.git.createRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: 'refs/heads/output', sha: main.data.object.sha
              });
            }

            for (const file of files) {
              const content = fs.readFileSync(`dist/${file}`).toString('base64');
              try {
                const existing = await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: file, ref: 'output'
                });
                await github.rest.repos.createOrUpdateFileContents({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: file, message: `update ${file}`, content, sha: existing.data.sha, branch: 'output'
                });
              } catch {
                await github.rest.repos.createOrUpdateFileContents({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: file, message: `add ${file}`, content, branch: 'output'
                });
              }
            }
